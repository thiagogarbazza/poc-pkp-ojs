services:

  app-pkp-ojs:
    image: pocs/pkp-ojs:latest
    build:
      context: ../../
      dockerfile: src/pkp-ojs/Dockerfile
    environment:
      OJS_CLI_INSTALL: OFF
      TZ: America/Sao_Paulo
    volumes:
      - ojs-files:/var/www/files
      - ojs-public:/var/www/html/public
      - ./config.inc.php:/var/www/html/config.inc.php
    ports:
      - "80:80"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost/healthcheck.php || exit 1
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    depends_on:
      postgres:
        condition: service_healthy
      smtp:
        condition: service_healthy

  app-job-backup:
    image: pocs/pkp-ojs-job-backup:latest
    build:
      context: ../../
      dockerfile: src/jobs/backup/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ojs
      POSTGRES_USER: my_db_oj_user
      POSTGRES_PASSWORD: my_db_oj_p@55
      TZ: America/Sao_Paulo
      WAIT_TO_START: 600 # 10 minutes
      WAIT_TO_END: 120 # 2 minutes
    volumes:
      - ojs-files:/var/www/files
      - ojs-public:/var/www/html/public
      - postgres-data:/var/lib/postgresql/data
      - backups:/data/backups
    depends_on:
      app-pkp-ojs:
        condition: service_healthy
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: ojs
      POSTGRES_USER: my_db_oj_user
      POSTGRES_PASSWORD: my_db_oj_p@55
      TZ: America/Sao_Paulo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready --dbname=$$POSTGRES_DB --username=$$POSTGRES_USER --quiet
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s

  smtp:
    image: maildev/maildev:2.2.1
    environment:
      MAILDEV_MAIL_DIRECTORY: /data/mail
      TZ: America/Sao_Paulo
    volumes:
      - smtp-data:/data/mail
    ports:
      - "1025:1025" # port SMTP
      - "1080:1080" # port Web UI
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:1080/healthz || exit 1
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s

volumes:
  backups:
  ojs-files:
  ojs-public:
  postgres-data:
  smtp-data:
